sonar.projectKey=nandhakumar12_Cognitive-adaptive-Ebook
sonar.organization=nandhakumar12
sonar.sources=frontend/src,backend
sonar.host.url=https://sonarcloud.io

# Exclude node_modules, test files, and build output from analysis
sonar.exclusions=**/node_modules/**,**/*.test.ts,**/*.test.tsx,**/*.test.js,**/*.spec.ts,**/*.spec.js,frontend/dist/**,backend/dist/**,**/coverage/**

# Test file locations (helps SonarCloud distinguish src from tests)
sonar.tests=frontend/src,backend
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.test.js,**/*.spec.ts,**/*.spec.js

# Path to LCOV coverage reports
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info,backend/coverage/lcov.info
