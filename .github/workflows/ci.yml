name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm install
      - name: Run tests with coverage
        working-directory: frontend
        run: npm run test:coverage
      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/lcov.info
      - name: Security Check (npm audit)
        working-directory: frontend
        run: npm audit --audit-level=high

  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        working-directory: backend
        run: npm install
      - name: Run tests with coverage
        working-directory: backend
        run: npm run test:coverage
      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/lcov.info
      - name: Security Check (npm audit)
        working-directory: backend
        run: npm audit --audit-level=high

  docker-scan:
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # needed to upload SARIF to Security tab
    steps:
      - uses: actions/checkout@v4

      - name: Build Data Service Image
        run: docker build -t data-service ./backend/services/data-service

      # ── 1. Human-readable table saved as a downloadable artifact ─────────────
      - name: Run Trivy vulnerability scanner (table)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'data-service:latest'
          format: 'table'
          output: 'trivy-report.txt'
          exit-code: '0'          # don't fail here — we fail on SARIF step below
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy report artifact
        uses: actions/upload-artifact@v4
        if: always()              # upload even when vulnerabilities are found
        with:
          name: trivy-vulnerability-report
          path: trivy-report.txt
          retention-days: 30

      # ── 2. SARIF upload → GitHub Security tab (persistent dashboard) ─────────
      - name: Run Trivy vulnerability scanner (SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'data-service:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '1'          # this step fails the build on CRITICAL/HIGH
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()              # upload even on failure so you can see findings
        with:
          sarif_file: 'trivy-results.sarif'

  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    needs: [frontend-test, backend-test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage
      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          SONAR_TOKEN: ${{ secrets.EBOOKTOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
