version: '3.8'

services:
  frontend:
    image: ${ECR_REGISTRY}/adaptive-cognitive-frontend:latest
    ports:
      - "80:3000"
    environment:
      - VITE_API_URL=https://www.nandhakumar.works/api
      - VITE_PROXY_TARGET=http://gateway:3001
      - VITE_AWS_REGION=us-east-1
      - VITE_COGNITO_USER_POOL_ID=us-east-1_GNr6QxV7t
      - VITE_COGNITO_CLIENT_ID=1hs80fmchi3rucp67b0devpo0q
    depends_on:
      - gateway
    restart: unless-stopped

  gateway:
    image: ${ECR_REGISTRY}/adaptive-cognitive-gateway:latest
    ports:
      - "3001:3001"
    environment:
      - EVENT_SERVICE_URL=http://event-service:3002
      - COGNITIVE_SERVICE_URL=http://cognitive-service:3003
      - ADAPTATION_SERVICE_URL=http://adaptation-service:3004
      - DATA_SERVICE_URL=http://data-service:3005
      - PORT=3001
      - AWS_REGION=us-east-1
      - COGNITO_USER_POOL_ID=us-east-1_GNr6QxV7t
      - FRONTEND_URL=https://www.nandhakumar.works
    depends_on:
      - event-service
      - cognitive-service
      - adaptation-service
    restart: unless-stopped

  data-service:
    image: ${ECR_REGISTRY}/adaptive-cognitive-data-service:latest
    ports:
      - "3005:3005"
    environment:
      - PORT=3005
    restart: unless-stopped

  event-service:
    image: ${ECR_REGISTRY}/adaptive-cognitive-event-service:latest
    ports:
      - "3002:3002"
    environment:
      - DATA_SERVICE_URL=http://data-service:3005
      - COGNITIVE_SERVICE_URL=http://cognitive-service:3003
      - ADAPTATION_SERVICE_URL=http://adaptation-service:3004
      - PORT=3002
    depends_on:
      - data-service
    restart: unless-stopped

  cognitive-service:
    image: ${ECR_REGISTRY}/adaptive-cognitive-cognitive-service:latest
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
    restart: unless-stopped

  adaptation-service:
    image: ${ECR_REGISTRY}/adaptive-cognitive-adaptation-service:latest
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
    restart: unless-stopped
